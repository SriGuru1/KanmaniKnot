name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Lint server
        run: npx eslint server/ --ext .js || true

      - name: Run integration tests
        env:
          NODE_ENV: test
          MONGO_URI_TEST: mongodb://localhost:27017/saree-tassels-test
          JWT_ACCESS_SECRET: test_access_secret_long_enough
          JWT_REFRESH_SECRET: test_refresh_secret_long_enough
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          PORT: 5001
        run: npm test

      - name: Build React client
        run: npm run build --prefix client

  deploy:
    name: Deploy to Render
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK" || echo "Deploy hook not configured"
